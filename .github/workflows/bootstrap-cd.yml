name: Bootstrap CD

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/bootstrap/**'
      - '.github/workflows/bootstrap-cd.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_VERSION: '1.6.0'
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  terraform-plan:
    name: 'CD - Terraform Plan'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/bootstrap
    env:
      TF_VAR_location: ${{ secrets.BOOTSTRAP_LOCATION }}
      TF_VAR_resource_group_name: ${{ secrets.BOOTSTRAP_RESOURCE_GROUP_NAME }}
      TF_VAR_storage_account_names: ${{ secrets.BOOTSTRAP_STORAGE_ACCOUNT_NAMES }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Backend Config
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "azurerm" {
              storage_account_name = "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
              container_name       = "tfstate"
              key                  = "bootstrap.terraform.tfstate"
              resource_group_name  = "${{ secrets.TF_STATE_RESOURCE_GROUP }}"
              use_azuread_auth     = true
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-tfplan
          path: terraform/bootstrap/tfplan
          retention-days: 1

  terraform-apply:
    name: 'CD - Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment:
      name: bootstrap-apply
    defaults:
      run:
        working-directory: ./terraform/bootstrap
    env:
      TF_VAR_location: ${{ secrets.BOOTSTRAP_LOCATION }}
      TF_VAR_resource_group_name: ${{ secrets.BOOTSTRAP_RESOURCE_GROUP_NAME }}
      TF_VAR_storage_account_names: ${{ secrets.BOOTSTRAP_STORAGE_ACCOUNT_NAMES }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Backend Config
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "azurerm" {
              storage_account_name = "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
              container_name       = "tfstate"
              key                  = "bootstrap.terraform.tfstate"
              resource_group_name  = "${{ secrets.TF_STATE_RESOURCE_GROUP }}"
              use_azuread_auth     = true
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tfplan
          path: terraform/bootstrap

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Output
        id: output
        run: terraform output -json
