name: Bootstrap CD

# Triggers on merge to main (after PR) or manual dispatch.
# Deploys sequentially: POC → Test → Prod.
# Each environment: Plan runs automatically, Apply requires approval.

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/bootstrap/**'
      - '.github/workflows/bootstrap-cd.yml'
      - '.github/workflows/bootstrap-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# GitHub Environments required:
#
#   Secrets environments (no protection rules):
#     poc   – POC ARM credentials + bootstrap config secrets
#     test  – Test ARM credentials + bootstrap config secrets
#     prod  – Prod ARM credentials + bootstrap config secrets
#
#   Approval-gate environments (required-reviewer protection, no secrets):
#     poc-approve
#     test-approve
#     prod-approve
#
#   Each secrets environment needs these secrets:
#     ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_SUBSCRIPTION_ID, ARM_TENANT_ID,
#     BOOTSTRAP_LOCATION, BOOTSTRAP_RESOURCE_GROUP_NAME, TF_STATE_STORAGE_ACCOUNT,
#     ALZ_STORAGE_ACCOUNT_NAMES, PROJECT_STORAGE_ACCOUNT_NAMES,
#     BOOTSTRAP_VNET_NAME, PROJECT_VNET_NAME
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  poc:
    name: POC
    uses: ./.github/workflows/bootstrap-deploy.yml
    with:
      environment: poc
    secrets: inherit

  test:
    name: Test
    needs: poc
    uses: ./.github/workflows/bootstrap-deploy.yml
    with:
      environment: test
    secrets: inherit

  prod:
    name: Prod
    needs: test
    uses: ./.github/workflows/bootstrap-deploy.yml
    with:
      environment: prod
    secrets: inherit
