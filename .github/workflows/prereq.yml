name: Prereq CI/CD

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_VERSION: '1.6.0'
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  # Plan – runs on manual dispatch: plan and save artifact
  terraform-plan-cd:
    name: 'CD - Terraform Plan'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/prereq
    env:
      TF_VAR_project_name: ${{ secrets.PREREQ_PROJECT_NAME }}
      TF_VAR_resource_group_name: ${{ secrets.PREREQ_RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ secrets.PREREQ_LOCATION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: prereq-tfplan
          path: terraform/prereq/tfplan
          retention-days: 1

  # Apply – waits for approval via the prereq-apply GitHub environment, then applies
  terraform-apply-cd:
    name: 'CD - Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan-cd
    environment:
      name: prereq-apply
    defaults:
      run:
        working-directory: ./terraform/prereq
    env:
      TF_VAR_project_name: ${{ secrets.PREREQ_PROJECT_NAME }}
      TF_VAR_resource_group_name: ${{ secrets.PREREQ_RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ secrets.PREREQ_LOCATION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: prereq-tfplan
          path: terraform/prereq

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Output
        id: output
        run: terraform output -json

